<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TokenLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .header {
      background: linear-gradient(135deg, #7c8cf8 0%, #a78bfa 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    .content {
      padding: 16px;
    }

    .status-bar {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    .status-dot.inactive {
      background: #555;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 10px;
      color: #888;
    }

    .platform-badge {
      margin-left: auto;
      background: linear-gradient(135deg, #7c8cf8, #a78bfa);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px;
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #f0f0ff;
      letter-spacing: -0.02em;
      font-feature-settings: 'tnum';
    }

    .stat-sub {
      font-size: 9px;
      color: #444;
      margin-top: 3px;
    }

    .context-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .context-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .context-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      font-weight: 600;
    }

    .context-percent {
      font-size: 11px;
      color: #7c8cf8;
      font-weight: 700;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c8cf8, #a78bfa);
      border-radius: 3px;
      transition: width 0.5s ease;
      min-width: 2px;
    }

    .context-numbers {
      font-size: 10px;
      color: #555;
      font-feature-settings: 'tnum';
    }

    .toggle-btn {
      width: 100%;
      background: rgba(124,140,248,0.1);
      border: 1px solid rgba(124,140,248,0.3);
      color: #7c8cf8;
      border-radius: 8px;
      padding: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .toggle-btn:hover {
      background: rgba(124,140,248,0.2);
      border-color: rgba(124,140,248,0.5);
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .accuracy-note {
      font-size: 9px;
      color: #333;
    }

    .version {
      font-size: 9px;
      color: #333;
    }

    .no-platform {
      text-align: center;
      padding: 24px 16px;
      color: #444;
    }

    .no-platform-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .no-platform-text {
      font-size: 11px;
      line-height: 1.6;
    }

    .supported {
      margin-top: 12px;
      font-size: 10px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="header-title">TokenLens</div>
      <div class="header-sub">Real-time token tracking</div>
    </div>
  </div>

  <div id="main-content">
    <!-- Filled by JS -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
